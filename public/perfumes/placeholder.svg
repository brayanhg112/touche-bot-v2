<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" fill="none">
  <rect width="300" height="420" fill="#131318"/>

  <!-- Bottle body -->
  <rect x="85" y="180" width="130" height="190" rx="18" fill="#f2ca50" fill-opacity="0.07" stroke="#f2ca50" stroke-opacity="0.25" stroke-width="1.5"/>

  <!-- Bottle shoulder curve -->
  <path d="M85 198 Q85 180 103 180 H197 Q215 180 215 198" fill="#f2ca50" fill-opacity="0.04" stroke="#f2ca50" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Neck -->
  <rect x="118" y="140" width="64" height="44" rx="6" fill="#f2ca50" fill-opacity="0.07" stroke="#f2ca50" stroke-opacity="0.25" stroke-width="1.5"/>

  <!-- Cap -->
  <rect x="110" y="112" width="80" height="32" rx="10" fill="#f2ca50" fill-opacity="0.18" stroke="#f2ca50" stroke-opacity="0.5" stroke-width="1.5"/>

  <!-- Cap top accent line -->
  <rect x="118" y="108" width="64" height="6" rx="3" fill="#f2ca50" fill-opacity="0.35"/>

  <!-- Inner bottle glow -->
  <rect x="100" y="195" width="100" height="155" rx="12" fill="#f2ca50" fill-opacity="0.03"/>

  <!-- Horizontal label line top -->
  <line x1="98" y1="248" x2="202" y2="248" stroke="#f2ca50" stroke-opacity="0.15" stroke-width="0.8"/>

  <!-- TE Monogram -->
  <text
    x="150"
    y="295"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="28"
    font-weight="700"
    fill="#f2ca50"
    fill-opacity="0.45"
    text-anchor="middle"
    letter-spacing="6">TE</text>

  <!-- Label line bottom -->
  <line x1="98" y1="310" x2="202" y2="310" stroke="#f2ca50" stroke-opacity="0.15" stroke-width="0.8"/>

  <!-- Subtle glow behind bottle -->
  <ellipse cx="150" cy="375" rx="55" ry="10" fill="#f2ca50" fill-opacity="0.06"/>
</svg>
